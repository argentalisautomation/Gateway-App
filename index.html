<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Control</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        h2, h3 { margin-top: 10px; margin-bottom: 10px; }

        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }

        button:hover { background-color: #444; }
        button:active { background-color: #555; }

        .device-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .toggle-btn {
            background-color: #ff3b30;
            width: 60px;
            height: 30px;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .toggle-btn.on { background-color: #34c759; }

        .toggle-knob {
            width: 26px;
            height: 26px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .toggle-btn.on .toggle-knob { transform: translateX(30px); }

        #deviceList {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #status {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            text-align: center;
        }

        #settingsPanel {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-item input {
            width: 60px;
            padding: 5px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            text-align: center;
        }

        .setting-item button {
            width: auto;
            padding: 5px 10px;
            margin: 0;
            font-size: 14px;
            background-color: #007aff;
        }

        /* Radar Card CSS */
        .radar-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            border: 2px solid transparent;
            transition: border-color 0.3s ease;
        }
        .radar-card.presence { border-color: #ff3b30; }
        .radar-header { display: flex; justify-content: space-between; width: 100%; font-weight: bold; margin-bottom: 15px; }
        .radar-status { font-size: 24px; color: #34c759; transition: color 0.3s ease; }
        .radar-card.presence .radar-status { color: #ff3b30; }
        .radar-dist { font-size: 18px; color: #aaa; }
        
        .calib-btn { background-color: #555; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        
        
        .radar-settings { display: none; width: 100%; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; }
        .radar-settings .setting-item { margin-bottom: 5px; }
        .gate-slider-container { display: flex; flex-direction: column; width: 100%; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        .gate-slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .gate-slider-row input[type=range] { flex: 1; margin: 0 10px; }
        .gate-slider-row span { width: 20px; text-align: center; }
        /* Bar Chart CSS */
        .chart-container { display: none; width: 100%; margin-top: 15px; }
        .chart-row { display: flex; align-items: flex-end; height: 60px; gap: 2px; margin-bottom: 10px; border-bottom: 1px solid #444; position: relative; }
        .chart-bar { flex: 1; background-color: #007aff; border-radius: 2px 2px 0 0; transition: height 0.1s; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;}
        .chart-bar span { font-size: 8px; margin-bottom: 2px; color: white; }
        .chart-label { font-size: 10px; color: #888; text-align: center; margin-bottom: 5px; }
    </style>
</head>

<body>
    <h1>ESP-NOW Gateway</h1>
    <button id="connectBtn">Connect Bluetooth</button>
    <div id="deviceList"></div>
    
    <div id="settingsPanel" style="display: none;">
        <h2>Settings</h2>
        <div class="setting-item">
            <label>IIR Filter (ms):</label>
            <input type="number" id="iirInput" min="1" max="1000">
            <button onclick="saveIIR()">Save</button>
        </div>
        <div class="setting-item">
            <label>Debounce (ms):</label>
            <input type="number" id="debounceInput" min="10" max="5000">
            <button onclick="saveDebounce()">Save</button>
        </div>
        <hr style="border-color:#333; margin:15px 0;">
        <h3>Touch Threshold Offsets</h3>
        <p style="font-size:12px; color:#888;">Higher offset = Harder to press</p>
        <div id="offsetsContainer"></div>
    </div>

    <div id="status">Disconnected</div>

    <script>
        const SERVICE_UUID = '12345678-1234-5678-1234-56789abcdef0';
        const ROSTER_UUID  = '12345678-1234-5678-1234-56789abcdef1';
        const CMD_UUID     = '12345678-1234-5678-1234-56789abcdef2';
        const STATE_UUID   = '12345678-1234-5678-1234-56789abcdef3';
        const CONFIG_UUID  = '12345678-1234-5678-1234-56789abcdef4';
        const LD2420_UUID  = '12345678-1234-5678-1234-56789abcdef5';

        let bleDevice;
        let gattServer;
        let cmdChar;
        let configChar;
        let devices = {};
        let configs = { offsets: [50,50,50,50,50,50], iir: 10, debounce: 500, radMin: 0, radMax: 15, radTout: 5, radMt: Array(16).fill(40), radSt: Array(16).fill(40) };

        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const deviceList = document.getElementById('deviceList');
        const settingsPanel = document.getElementById('settingsPanel');

        connectBtn.addEventListener('click', async () => {
            try {
                statusEl.textContent = 'Requesting Bluetooth Device...';
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32_Gateway' }],
                    optionalServices: [SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

                statusEl.textContent = 'Connecting to GATT Server...';
                gattServer = await bleDevice.gatt.connect();

                statusEl.textContent = 'Getting Service...';
                const service = await gattServer.getPrimaryService(SERVICE_UUID);

                statusEl.textContent = 'Getting Characteristics...';
                const rosterChar = await service.getCharacteristic(ROSTER_UUID);
                cmdChar = await service.getCharacteristic(CMD_UUID);
                const stateChar = await service.getCharacteristic(STATE_UUID);
                configChar = await service.getCharacteristic(CONFIG_UUID);

                statusEl.textContent = 'Reading Roster...';
                const rosterValue = await rosterChar.readValue();
                parseRoster(rosterValue.buffer);

                statusEl.textContent = 'Reading Configuration...';
                const configValue = await configChar.readValue();
                parseConfig(configValue.buffer);

                statusEl.textContent = 'Subscribing to State Updates...';
                await stateChar.startNotifications();
                stateChar.addEventListener('characteristicvaluechanged', handleStateUpdate);

                                statusEl.textContent = 'Subscribing to Radar Updates...';
                try {
                    const radarChar = await service.getCharacteristic(LD2420_UUID);
                    await radarChar.startNotifications();
                    radarChar.addEventListener('characteristicvaluechanged', handleRadarUpdate);
                } catch(e) { console.log('Radar char not found'); }

                statusEl.textContent = 'Connected & Synced';
                connectBtn.style.display = 'none';
            } catch (error) {
                statusEl.textContent = 'Error: ' + error.message;
                console.error(error);
            }
        });

        function onDisconnected() {
            statusEl.textContent = 'Disconnected';
            connectBtn.style.display = 'block';
            deviceList.innerHTML = '';
            settingsPanel.style.display = 'none';
            devices = {};
        }

        function parseRoster(buffer) {
            const view = new DataView(buffer);
            let offset = 0;
            while (offset < view.byteLength) {
                const id = view.getUint8(offset++);
                const type = view.getUint8(offset++);
                const state = view.getUint8(offset++);
                const nameLen = view.getUint8(offset++);

                const nameBytes = new Uint8Array(buffer, offset, nameLen);
                const name = new TextDecoder().decode(nameBytes);
                offset += nameLen;

                devices[id] = { type, state, name };
            }
            renderUI();
        }

        function parseConfig(buffer) {
            const view = new DataView(buffer);
            configs.offsets = [];
            for (let i = 0; i < 6; i++) {
                configs.offsets.push(view.getUint16(i * 2, true));
            }
            configs.iir = view.getUint32(12, true);
            configs.debounce = view.getUint32(16, true);
            
            if (view.byteLength >= 56) {
                configs.radMin = view.getUint8(20);
                configs.radMax = view.getUint8(21);
                configs.radTout = view.getUint16(22, true);
                for(let i=0; i<16; i++) {
                    configs.radMt[i] = view.getUint8(24 + i);
                    configs.radSt[i] = view.getUint8(40 + i);
                }
            }
            renderSettings();
            settingsPanel.style.display = 'block';
        }

        function renderSettings() {
            document.getElementById('iirInput').value = configs.iir;
            document.getElementById('debounceInput').value = configs.debounce;
            const container = document.getElementById('offsetsContainer');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const div = document.createElement('div');
                div.className = 'setting-item';
                div.innerHTML = `
                    <label>S${i + 1} Threshold Offset:</label>
                    <input type="number" id="offsetInput${i + 1}" value="${configs.offsets[i]}" min="1" max="1000">
                    <button onclick="saveOffset(${i + 1})">Save</button>
                `;
                container.appendChild(div);
            }
        }

        async function saveIIR() {
            if (!configChar) return;
            const val = parseInt(document.getElementById('iirInput').value);
            const payload = new Uint8Array(5);
            payload[0] = 2; // Type 2
            new DataView(payload.buffer).setUint32(1, val, true);
            try { 
                await configChar.writeValue(payload); 
                alert("IIR Saved! ESP32 may need a reboot for filter changes."); 
                statusEl.textContent = 'Config Updated';
            } catch(e) { statusEl.textContent = 'Failed: ' + e; }
        }

        async function saveDebounce() {
            if (!configChar) return;
            const val = parseInt(document.getElementById('debounceInput').value);
            const payload = new Uint8Array(5);
            payload[0] = 3; // Type 3
            new DataView(payload.buffer).setUint32(1, val, true);
            try { 
                await configChar.writeValue(payload); 
                statusEl.textContent = 'Config Updated';
            } catch(e) { statusEl.textContent = 'Failed: ' + e; }
        }

        async function saveOffset(id) {
            if (!configChar) return;
            const val = parseInt(document.getElementById(`offsetInput${id}`).value);
            const payload = new Uint8Array(4);
            payload[0] = 1; // Type 1
            payload[1] = id;
            new DataView(payload.buffer).setUint16(2, val, true);
            try { 
                await configChar.writeValue(payload); 
                statusEl.textContent = 'Config Updated';
            } catch(e) { statusEl.textContent = 'Failed: ' + e; }
        }

        function handleStateUpdate(event) {
            const view = event.target.value;
            const id = view.getUint8(0);
            const state = view.getUint8(1);

            if (devices[id]) {
                devices[id].state = state;
                const toggleBtn = document.getElementById(`toggle-${id}`);
                if (toggleBtn) {
                    if (state) toggleBtn.classList.add('on');
                    else toggleBtn.classList.remove('on');
                }
            }
        }

                let calibMode = false;

        function handleRadarUpdate(event) {
            const view = event.target.value;
            const presence = view.getUint8(0);
            const dist = view.getUint16(1, true);
            
            const card = document.getElementById('radar-card');
            if(card) {
                const statusEl = card.querySelector('.radar-status');
                const distEl = card.querySelector('.radar-dist');
                if(presence > 0) {
                    card.classList.add('presence');
                    statusEl.textContent = 'Presence Detected';
                } else {
                    card.classList.remove('presence');
                    statusEl.textContent = 'Clear';
                }
                distEl.textContent = (dist > 0 && dist < 1500) ? (dist/100).toFixed(2) + ' m' : '';
            }

            if(calibMode) {
                for(let i=0; i<16; i++) {
                    const moveE = view.getUint8(5 + i);
                    const stillE = view.getUint8(21 + i);
                    
                    const mBar = document.getElementById(`mbar-${i}`);
                    const sBar = document.getElementById(`sbar-${i}`);
                    if(mBar) {
                        mBar.style.height = Math.max(moveE, 5) + '%';
                        mBar.querySelector('span').textContent = moveE;
                    }
                    if(sBar) {
                        sBar.style.height = Math.max(stillE, 5) + '%';
                        sBar.querySelector('span').textContent = stillE;
                    }
                }
            }
        }

        function toggleCalib() {
            calibMode = !calibMode;
            document.getElementById('calib-container').style.display = calibMode ? 'block' : 'none';
        }

        
        function toggleRadarSettings() {
            const el = document.getElementById('radar-settings-panel');
            if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        async function saveRadarTimeout() {
            if (!configChar) return;
            const val = parseInt(document.getElementById('radToutInput').value);
            const payload = new Uint8Array(3);
            payload[0] = 4;
            new DataView(payload.buffer).setUint16(1, val, true);
            try { await configChar.writeValue(payload); statusEl.textContent = 'Config Updated'; } catch(e) { }
        }

        async function saveRadarGates() {
            if (!configChar) return;
            const payload = new Uint8Array(3);
            payload[0] = 5;
            payload[1] = parseInt(document.getElementById('radMinInput').value);
            payload[2] = parseInt(document.getElementById('radMaxInput').value);
            try { await configChar.writeValue(payload); statusEl.textContent = 'Config Updated'; } catch(e) { }
        }

        async function saveRadarMoveThresh() {
            if (!configChar) return;
            const payload = new Uint8Array(17);
            payload[0] = 6;
            for(let i=0; i<16; i++) {
                payload[i+1] = document.getElementById(`radMt${i}`).value;
            }
            try { await configChar.writeValue(payload); statusEl.textContent = 'Config Updated'; } catch(e) { }
        }
        
        async function saveRadarStillThresh() {
            if (!configChar) return;
            const payload = new Uint8Array(17);
            payload[0] = 7;
            for(let i=0; i<16; i++) {
                payload[i+1] = document.getElementById(`radSt${i}`).value;
            }
            try { await configChar.writeValue(payload); statusEl.textContent = 'Config Updated'; } catch(e) { }
        }

        function updateSliderLabel(id, val) {
            document.getElementById(id + '-val').textContent = val;
        }

                function renderUI() {
            deviceList.innerHTML = '';
            for (const [id, dev] of Object.entries(devices)) {
                if (dev.type === 2) { // Radar
                    const card = document.createElement('div');
                    card.className = 'radar-card';
                    card.id = 'radar-card';
                    
                    let chartHTML = `<div class="chart-container" id="calib-container">
                        <div style="font-size:12px; margin-bottom:5px; color:#aaa;">Moving Energy</div>
                        <div class="chart-row">`;
                    for(let i=0; i<16; i++) {
                        chartHTML += `<div style="flex:1; position:relative;"><div class="chart-bar" id="mbar-${i}" style="height:5%;"><span>0</span></div><div class="chart-label">${i}</div><div id="mthresh-${i}" style="position:absolute; bottom:${configs.radMt[i]}%; left:0; right:0; height:2px; background:red; z-index:10;"></div></div>`;
                    }
                    chartHTML += `</div><div style="font-size:12px; margin-bottom:5px; color:#aaa;">Still Energy</div><div class="chart-row">`;
                    for(let i=0; i<16; i++) {
                        chartHTML += `<div style="flex:1; position:relative;"><div class="chart-bar" id="sbar-${i}" style="height:5%; background-color:#ff9500;"><span>0</span></div><div class="chart-label">${i}</div><div id="sthresh-${i}" style="position:absolute; bottom:${configs.radSt[i]}%; left:0; right:0; height:2px; background:red; z-index:10;"></div></div>`;
                    }
                    chartHTML += `</div>
                        <button class="calib-btn" onclick="toggleRadarSettings()" style="margin-top:10px;">⚙️ Configuration Settings</button>
                        <div class="radar-settings" id="radar-settings-panel">
                            <div class="setting-item">
                                <label>Timeout (s):</label>
                                <input type="number" id="radToutInput" value="${configs.radTout}" style="width:50px;">
                                <button onclick="saveRadarTimeout()">Save</button>
                            </div>
                            <div class="setting-item">
                                <label>Min Gate (0-15):</label>
                                <input type="number" id="radMinInput" value="${configs.radMin}" min="0" max="15" style="width:40px;">
                            </div>
                            <div class="setting-item">
                                <label>Max Gate (0-15):</label>
                                <input type="number" id="radMaxInput" value="${configs.radMax}" min="0" max="15" style="width:40px;">
                                <button onclick="saveRadarGates()">Save</button>
                            </div>
                            <div class="gate-slider-container">
                                <strong>Moving Thresholds</strong>
                                <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">
                    `;
                    for(let i=0; i<16; i++) {
                        chartHTML += `<div style="width:100%; display:flex; align-items:center; font-size:10px;">Gate ${i}: <input type="range" id="radMt${i}" value="${configs.radMt[i]}" min="0" max="100" style="flex:1;" oninput="updateSliderLabel('radMt${i}', this.value)"><span id="radMt${i}-val">${configs.radMt[i]}</span></div>`;
                    }
                    chartHTML += `      </div><button onclick="saveRadarMoveThresh()">Save Moving Thresholds</button>
                            </div>
                            <div class="gate-slider-container">
                                <strong>Still Thresholds</strong>
                                <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">
                    `;
                    for(let i=0; i<16; i++) {
                        chartHTML += `<div style="width:100%; display:flex; align-items:center; font-size:10px;">Gate ${i}: <input type="range" id="radSt${i}" value="${configs.radSt[i]}" min="0" max="100" style="flex:1;" oninput="updateSliderLabel('radSt${i}', this.value)"><span id="radSt${i}-val">${configs.radSt[i]}</span></div>`;
                    }
                    chartHTML += `      </div><button onclick="saveRadarStillThresh()">Save Still Thresholds</button>
                            </div>
                        </div>
                    </div>`;

                    card.innerHTML = `
                        <div class="radar-header">
                            <span>${dev.name}</span>
                            <span class="radar-status">Clear</span>
                        </div>
                        <div class="radar-dist"></div>
                        <button class="calib-btn" onclick="toggleCalib()">Toggle Calibration View</button>
                        ${chartHTML}
                    `;
                    deviceList.prepend(card);
                } else if (dev.type === 1) { // Switch
                    const card = document.createElement('div');
                    card.className = 'device-card';

                    const nameEl = document.createElement('span');
                    nameEl.textContent = dev.name;

                    const toggleBtn = document.createElement('div');
                    toggleBtn.className = `toggle-btn ${dev.state ? 'on' : ''}`;
                    toggleBtn.id = `toggle-${id}`;

                    const knob = document.createElement('div');
                    knob.className = 'toggle-knob';

                    toggleBtn.appendChild(knob);

                    toggleBtn.addEventListener('click', () => {
                        const newState = toggleBtn.classList.contains('on') ? 0 : 1;
                        sendCommand(parseInt(id), newState);
                    });

                    card.appendChild(nameEl);
                    card.appendChild(toggleBtn);
                    deviceList.appendChild(card);
                }
            }
        }

        async function sendCommand(id, state) {
            if (!cmdChar) return;
            try {
                const payload = new Uint8Array([id, state]);
                await cmdChar.writeValue(payload);
                const toggleBtn = document.getElementById(`toggle-${id}`);
                if (state) toggleBtn.classList.add('on');
                else toggleBtn.classList.remove('on');
                devices[id].state = state;
            } catch (err) {
                console.error("Command failed", err);
                statusEl.textContent = 'Command failed: ' + err.message;
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('SW registered', reg))
                .catch(err => console.error('SW failed', err));
        }
    </script>
</body>

</html>
